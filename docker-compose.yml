services:
  onyx:
    build: .
    ports:
      - "${ONYX_PORT:-8080}:8080"
    volumes:
      - ./config:/config
      - ./data:/srv
      - ./.versions:/versions
      - ./.trash:/trash
      - ./.cache:/cache
    environment:
      - ONYX_DATA=/srv
      - ONYX_CONFIG=/config
    user: "1000:1000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
